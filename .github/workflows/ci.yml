name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    # Self-hosted Linux runner — persistent ~/.cargo and core/target/ cache between runs.
    # Register runner with labels: self-hosted, linux, x64
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Go (required by kwaai-p2p-daemon build script)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Check formatting
        working-directory: core
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: core
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Self-hosted Linux — registers with labels: self-hosted, linux, x64
          - name: linux
            runner: [self-hosted, linux, x64]
          # Self-hosted M4 Mac — registers with labels: self-hosted, macos, arm64
          - name: macos-arm64
            runner: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go (required by kwaai-p2p-daemon build script)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Run tests
        working-directory: core
        run: cargo test --all

  build:
    name: Build
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go (required by kwaai-p2p-daemon build script)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build release
        working-directory: core
        run: cargo build --release --all

  wasm:
    name: WASM Build
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack (skip if already installed)
        run: command -v wasm-pack || cargo install wasm-pack

      - name: Build WASM
        working-directory: core/crates/kwaai-wasm
        run: wasm-pack build --target web

  docs:
    name: Documentation
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go (required by kwaai-p2p-daemon build script)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build docs
        working-directory: core
        run: cargo doc --no-deps --all

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: core/target/doc
          overwrite: true
