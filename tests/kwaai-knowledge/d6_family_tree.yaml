  # ─── Key places ───────────────────────────────────────────────────────────────

  - canonical: "District Six"
    entity_type: Place
    description: >
      District Six was a vibrant, multicultural community near the centre of
      Cape Town, situated below Devil's Peak. It was home to Coloured, African,
      Indian, and White residents who built a rich urban culture of music, jazz,
      and community life. Under the Group Areas Act, the apartheid government
      declared it a White area in 1966 and carried out forced removals of all
      non-White residents to the Cape Flats, bulldozing and demolishing almost
      every building. These forced removals destroyed a thriving community.
      It is the setting of the memoir "Lest We Forget" by Yousuf Rassool.
    aliases:
      - "District 6"
      - "the District"
      - "Distrik Ses"
      - "District Six: Lest we Forget"
      - "Lest we Forget"
      - "Ben District Six"
      - "District Six Museum"
      - "District Six community"
      - "the district of District Six"

  - canonical: "Cape Flats"
    entity_type: Place
    aliases:
      - "the Cape Flats"
      - "Flats"

  - canonical: "Kloof Nek"
    entity_type: Place
    description: >
      Kloof Nek is a natural saddle or mountain pass between Table Mountain and
      Lion's Head in Cape Town. Kloof Street climbs from the city bowl up to
      Kloof Nek. Beyond it lies the Glen and the Atlantic seaboard. Buitencingle
      Street in District Six sits below Table Mountain not far from Kloof Nek.
      The area is a landmark of Cape Town's topography, offering views of both
      Table Mountain and Lion's Head.
    aliases:
      - "Kloof Nek Pass"

  - canonical: "7 Buitencingle Street"
    entity_type: Place
    description: >
      7 Buitencingle Street (also written No. 7 Buitencingle) was the grand
      13-room mansion of J.M.H. Gool — grandfather of the memoir's author —
      in District Six, Cape Town. Buitencingle is Dutch in origin — "cingle"
      means belt, and Buitencingle was at the time the outermost belt of Cape
      Town. The street was wide and cobbled with traffic islands sporting stunted
      palm trees. The mansion had a view of Table Mountain and Devil's Peak.
    aliases:
      - "Buitencingle Street"
      - "Buitencingle"
      - "the Buitencingle mansion"
      - "7 Buitenkingle Street"
      - "No. 7 Buitencingle"

