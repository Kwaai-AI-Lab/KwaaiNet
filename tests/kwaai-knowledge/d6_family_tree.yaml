  - canonical: "Non-European Unity Movement"
    entity_type: Organization
    description: >
      The Non-European Unity Movement (NEUM) was founded in 1943 to unite
      African, Coloured, and Indian people against apartheid and colonialism.
      Its programme was based on the Ten Point plan for equal rights. The NEUM
      adopted a boycott and non-collaboration policy — refusing to participate
      in any apartheid government institutions, including the Coloured Advisory
      Council. The Teachers League of South Africa (TLSA) was affiliated with
      the NEUM and shared its boycott and non-collaboration programme.
    fields:
      foundingDate: "1943"
    aliases:
      - "NEUM"
      - "Non European Unity Movement"
      - "Unity Movement"

  - canonical: "Cape Coloured political organisations"
    entity_type: Organization
    description: >
      The main political organisations active in the Cape Coloured community
      during the mid-twentieth century were: the Non-European Unity Movement
      (NEUM), the Teachers League of South Africa (TLSA), the New Era
      Fellowship (NEF), and the All African Convention (AAC). These organisations
      were united by the boycott and non-collaboration policy against apartheid
      institutions. The NEUM was the umbrella body; the TLSA organised Coloured
      teachers; the NEF was a discussion and lecture forum; and the AAC was a
      broader African political body that joined forces with the Unity Movement.
    aliases:
      - "political organisations Cape Coloured"
      - "organisations active in the Cape Coloured community"
      - "political organisations in the Cape"

  - canonical: "Teachers League of South Africa"
    entity_type: Organization
    description: >
      The Teachers League of South Africa (TLSA) was a professional and
      political organisation for Coloured teachers. Affiliated with the
      Non-European Unity Movement, it adopted the boycott and non-collaboration
      policy, challenging racial discrimination in education and fighting for
      equal opportunities for Coloured teachers and students.
    aliases:
      - "TLSA"
      - "Teachers' League of South Africa"
      - "League of South Africa"
      - "the League"

  - canonical: "New Era Fellowship"
    entity_type: Organization
    description: >
      The New Era Fellowship (NEF) was a cultural and political discussion
      society in Cape Town, associated with the Non-European Unity Movement.
      It held public lectures and debates on political, social, and
      philosophical topics, and served as a gathering place for progressive
      intellectuals, teachers, and activists in the Coloured community.
    aliases:
      - "NEF"

  - canonical: "All African Convention"
    entity_type: Organization
    description: >
      The All African Convention (AAC) was founded in 1935 in response to the
      Hertzog Bills, which stripped Africans of their limited voting rights.
      It united a broad coalition of African political organisations seeking
      unity against racial oppression. It later aligned closely with the
      Non-European Unity Movement and its non-collaboration policy.
    fields:
      foundingDate: "1935"
    aliases:
      - "AAC"
      - "All-African Convention"

  - canonical: "Gool family"
    entity_type: Organization
    description: >
      The Gool family was a prominent Muslim family in District Six, Cape Town.
      J.M.H. Gool's grand home at 7 Buitencingle Street hosted many celebrated
      visitors. Mahatma Gandhi visited 7 Buitencingle during his 1914 farewell
      visit to South Africa before returning to India, where he had pioneered
      satyagraha — the philosophy of non-violent, passive resistance. Cecil
      John Rhodes and George Bernard Shaw also visited the Buitencingle Street
      home. The Gool family played a central role in early Cape Muslim and
      Indian political life, connecting District Six to national and
      international anti-colonial struggles.
