      Mohandas Karamchand Gandhi, known as Mahatma Gandhi (Mahatma meaning
      "Great Soul"), came to South Africa in 1893 as a lawyer to work on a
      legal case. He lived and worked in South Africa for over 20 years,
      developing his philosophy of satyagraha (non-violent resistance, or
      passive resistance) as a tool of political struggle. He founded the
      newspaper Indian Opinion to advocate for non-European rights in South
      Africa. He was connected to the Gool family in Cape Town, staying at
      their home at 7 Buitencingle Street during his 1914 South Africa farewell
      visit. Gandhi returned to India in 1914.
