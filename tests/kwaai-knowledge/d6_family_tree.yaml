  # ─── Gandhi's son (historical figure, appears in memoir) ────────────────────

  - canonical: "Manilal Gandhi"
    gender: "Male"
    description: >
      Manilal Gandhi was the son of Mahatma Gandhi. While visiting Cape Town
      he fell in love with Fatima "Timmie" Gool, J.M.H. Gool's daughter — but
      as she was Muslim and he Hindu, his father objected and had him
      recalled to India in 1926, where he was married instead to Sushila,
      a match Gandhi arranged. (The memoir itself narrates this recall
      undated, in a passage sandwiched between sentences about Gandhi's July
      and August 1914 activities — 1914 was mistakenly inferred from that
      proximity in an earlier version of this description; 1926 is the
      historically documented date.) Manilal remained close friends with
      Timmie and Sushila afterward. He went on to take over as editor of
      Indian Opinion, the newspaper his father had founded, and remained
      politically active in South Africa, including threatening a protest
      fast of his own in the early 1950s against the removal of the
      "Coloured" vote.
    aliases:
      - "Manilal"

