  # ─── Mohandas Karamchand Gandhi (historical figure) ────────────────────────

  - canonical: "Mohandas Karamchand Gandhi"
    gender: "Male"
    description: >
      Mohandas Karamchand Gandhi, known as Mahatma Gandhi (Mahatma meaning
      "Great Soul"), came to South Africa in 1893 as a lawyer on a one-year
      assignment for the merchant Dada Abdullah, and stayed on for over 20
      years developing satyagraha (non-violent resistance) after Natal moved
      to disenfranchise Indians in 1894. He founded the Natal Indian Congress
      and the newspaper Indian Opinion. His relationship with the Gool family
      of Cape Town spanned nearly two decades: J.M.H. Gool first wrote to him
      in 1897 in support after Gandhi survived a lynch-mob attack at the
      Durban docks; the two corresponded for years afterward, including
      letters exchanged with J.M.H.'s son Abdul Hamid Gool during his medical
      studies at Guy's Hospital in London (c.1906-1910). Gandhi was a guest at
      the Gool home, 7 Buitencingle Street, on at least three occasions — in
      1911 (where he helped stain the surgery floors), in October 1912 (to
      receive the visiting G. H. Gokhale), and in February-March 1914, when
      his wife Kasturba fell seriously ill and was nursed by the Gool family.
      In August 1914, Abdul Hamid Gool gave Gandhi a farewell address on
      behalf of Port Elizabeth's Indian community and hailed him as "Mahatma"
      — the book argues this predates the title's more commonly cited later
      use in India. Gandhi's actual final overnight stay in Cape Town before
      departing South Africa on 18 July 1914 was at the home of Morris and
      Ruth Alexander, not at 7 Buitencingle Street. He sent his son Manilal
      home to India that same year. Gandhi was assassinated in January 1948
      by Nathuram Godse. The correspondence between Gandhi and J.M.H. Gool was
      later supplied to the memoir's author by Gandhi scholar E.S. Reddy.
    fields:
      birthDate: "1869-10-02"
      deathDate: "1948-01-30"
