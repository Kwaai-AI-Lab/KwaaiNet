    description: >
      Haji Joosub Maulvi Hamid Gool (J.M.H. Gool) arrived in Cape Town in 1884
      from Mauritius, with family origins in Swat via Gujarat, India. He was a
      spice merchant and community leader who became a founding trustee of the
      Hanaffi Quwatul Islam Mosque in District Six. He lived at 7 Buitencingle
      Street, where he received notable visitors including Mahatma Gandhi —
      publisher of Indian Opinion and champion of satyagraha — during Gandhi's
      1914 farewell visit to South Africa before returning to India. Cecil John
      Rhodes, George Bernard Shaw, and Dr. Abdulla Abdurahman also visited. He
      had two wives: Bibi Gool (children: Ayesha Rassool, Mohamed Saaid Gool,
      Zohra, Ahmed, Goolam Gool, Jane Gool-Tabata, Minnie, Fatima Gool) and
      Wahida Gool (children: Abdul Hamid Gool, Mariam, Zobeida, Mohammed Hanief
      Gool). His son Abdul Hamid Gool married Cissie Gool (Zainunnissa, daughter
      of Dr. Abdulla Abdurahman) — making Cissie Gool his daughter-in-law. He performed the Hajj in 1899 and died in April 1940.
      He was the grandfather of the memoir's author, Yousuf (Joe) Rassool.
    fields:
      arrived_cape_town: "1884"
      origin: "Mauritius (via Swat, Gujarat)"
      deathDate: "1940-04-01"

